AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Nexus Workspace – Backend API (API Gateway + Lambda) and
  Frontend Hosting (S3 + CloudFront).

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  StageName:
    Type: String
    Default: prod
    Description: API Gateway deployment stage name.

  NotionIntegrationToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: Notion integration token used to access the Topics database.

  NotionTopicsDatabaseId:
    Type: String
    Default: ""
    Description: Notion database ID for AI-Engineering-Prep/Topics.

  OpenAIApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: OpenAI API key used by the async review worker.

  OpenAIModel:
    Type: String
    Default: gpt-4o-mini
    Description: OpenAI model used to generate review questions.

  Environment:
    Type: String
    Default: production
    AllowedValues: [dev, development, staging, production]

# ---------------------------------------------------------------------------
# Globals
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
    Layers:
      - !Ref CommonLayer

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── API Gateway ───────────────────────────────────────────────────────────
  NexusApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: NexusWorkspaceApi
      StageName: !Ref StageName
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: PersonalTokenAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          PersonalTokenAuthorizer:
            FunctionArn: !GetAtt TokenAuthorizerFunction.Arn
            FunctionPayloadType: TOKEN
            Identity:
              Header: Authorization
              ReauthorizeEvery: 300

  # ── Personal Token Authorizer ────────────────────────────────────────────────
  TokenAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "nexus-token-authorizer-${Environment}"
      CodeUri: functions/token_authorizer/
      Handler: handler.lambda_handler
      Description: Validates Bearer token from SSM – protects all API routes.
      Environment:
        Variables:
          SSM_TOKEN_PATH: !Sub "/nexus/${Environment}/personal-api-token"
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/nexus/${Environment}/personal-api-token"

  # ── Shared Lambda Layer ───────────────────────────────────────────────────
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: NexusCommonLayer
      Description: Shared utilities for all Nexus Lambda functions.
      ContentUri: layers/common/
      CompatibleRuntimes:
        - python3.12
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.12

  # ── SQS Queue (async review jobs) ──────────────────────────────────────────

  ReviewDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "nexus-review-dlq-${Environment}"
      MessageRetentionPeriod: 604800  # 7 days

  ReviewQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "nexus-review-queue-${Environment}"
      VisibilityTimeout: 180          # >= worker Lambda timeout (120 s) + buffer
      MessageRetentionPeriod: 86400   # 1 day
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ReviewDeadLetterQueue.Arn
        maxReceiveCount: 3

  # ── DynamoDB Table (async review job state / results) ────────────────────

  ReviewJobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "nexus-review-jobs-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: requestId
          AttributeType: S
      KeySchema:
        - AttributeName: requestId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # ── Notion Review Lambda ──────────────────────────────────────────────────
  NotionReviewFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "nexus-notion-review-${Environment}"
      CodeUri: functions/notion_review_trigger/
      Handler: handler.lambda_handler
      Description: Triggers an LLM-based review of Notion topics.
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          NOTION_INTEGRATION_TOKEN: !Ref NotionIntegrationToken
          NOTION_TOPICS_DATABASE_ID: !Ref NotionTopicsDatabaseId
          REVIEW_QUEUE_URL: !Ref ReviewQueue
          REVIEW_JOBS_TABLE_NAME: !Ref ReviewJobsTable
          REVIEW_TRACKING_BUCKET_NAME: !Ref ReviewTrackingBucket
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt ReviewQueue.Arn
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource: !GetAtt ReviewJobsTable.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub "${ReviewTrackingBucket.Arn}/reviews/*"
      Events:
        GetTopics:
          Type: Api
          Properties:
            RestApiId: !Ref NexusApi
            Path: /notion-review/topics
            Method: GET
        TriggerReview:
          Type: Api
          Properties:
            RestApiId: !Ref NexusApi
            Path: /notion-review/trigger
            Method: POST
        GetReviewResult:
          Type: Api
          Properties:
            RestApiId: !Ref NexusApi
            Path: /notion-review/results/{requestId}
            Method: GET
        LogReview:
          Type: Api
          Properties:
            RestApiId: !Ref NexusApi
            Path: /notion-review/log-review
            Method: POST
        GetTracker:
          Type: Api
          Properties:
            RestApiId: !Ref NexusApi
            Path: /notion-review/tracker
            Method: GET

  # ── Async review worker (uses shared SQS + DynamoDB) ─────────────────────

  NotionReviewWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "nexus-notion-review-worker-${Environment}"
      CodeUri: functions/notion_review_worker/
      Handler: handler.lambda_handler
      Description: Processes Notion review jobs from SQS (fetch content + OpenAI questions).
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          NOTION_INTEGRATION_TOKEN: !Ref NotionIntegrationToken
          NOTION_TOPICS_DATABASE_ID: !Ref NotionTopicsDatabaseId
          REVIEW_JOBS_TABLE_NAME: !Ref ReviewJobsTable
          OPENAI_API_KEY: !Ref OpenAIApiKey
          OPENAI_MODEL: !Ref OpenAIModel
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
                - sqs:ChangeMessageVisibility
              Resource: !GetAtt ReviewQueue.Arn
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource: !GetAtt ReviewJobsTable.Arn
      Events:
        ReviewQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ReviewQueue.Arn
            BatchSize: 1

  # ── S3 Bucket (Frontend Static Assets) ───────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "nexus-frontend-${AWS::AccountId}-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: NexusWorkspace

  # ── S3 Bucket Policy (CloudFront OAC) ─────────────────────────────────────
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  # ── CloudFront Origin Access Control ─────────────────────────────────────
  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: NexusFrontendOAC
        Description: OAC for Nexus Frontend S3 bucket
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── CloudFront Distribution ───────────────────────────────────────────────
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "Nexus Workspace Frontend – ${Environment}"
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt FrontendOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
      Tags:
        - Key: Project
          Value: NexusWorkspace

  # ── S3 Bucket (Review Tracking Data) ────────────────────────────────────
  ReviewTrackingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "nexus-review-tracking-${AWS::AccountId}-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: NexusWorkspace

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  ApiEndpoint:
    Description: API Gateway base URL
    Value: !Sub "https://${NexusApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiEndpoint"

  CloudFrontDomainName:
    Description: CloudFront distribution domain name (use as the frontend URL)
    Value: !GetAtt FrontendDistribution.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontDomain"

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (used for cache invalidation in CI/CD)
    Value: !Ref FrontendDistribution
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontDistributionId"

  FrontendBucketName:
    Description: S3 bucket name for frontend static assets
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub "${AWS::StackName}-FrontendBucketName"

  ReviewQueueUrl:
    Description: SQS queue URL for async review jobs
    Value: !Ref ReviewQueue
    Export:
      Name: !Sub "${AWS::StackName}-ReviewQueueUrl"

  ReviewJobsTableName:
    Description: DynamoDB table name for async review job state/results
    Value: !Ref ReviewJobsTable
    Export:
      Name: !Sub "${AWS::StackName}-ReviewJobsTableName"

  ReviewTrackingBucketName:
    Description: S3 bucket for monthly review tracking data (calendar UI)
    Value: !Ref ReviewTrackingBucket
    Export:
      Name: !Sub "${AWS::StackName}-ReviewTrackingBucketName"
