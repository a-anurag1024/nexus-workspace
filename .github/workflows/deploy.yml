name: Deploy Nexus Workspace

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions required for OIDC token generation.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  SAM_STACK_NAME: ${{ vars.SAM_STACK_NAME || 'nexus-workspace' }}
  # S3 bucket name and CloudFront distribution ID are read from SAM outputs
  # in the Frontend job so they don't need to be hard-coded here.

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1 – Backend (AWS SAM)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (SAM)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        working-directory: backend
        run: sam build --use-container

      - name: SAM Deploy
        working-directory: backend
        run: |
          sam deploy \
            --stack-name "${{ env.SAM_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              CognitoUserPoolArn="${{ secrets.COGNITO_USER_POOL_ARN }}" \
              CognitoUserPoolId="${{ secrets.COGNITO_USER_POOL_ID }}" \
              Environment=production

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2 – Frontend (Next.js → S3 → CloudFront)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read SAM stack outputs
        id: stack-outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.SAM_STACK_NAME }}" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          DIST=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.SAM_STACK_NAME }}" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          API=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.SAM_STACK_NAME }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution=$DIST" >> "$GITHUB_OUTPUT"
          echo "api_url=$API" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ steps.stack-outputs.outputs.api_url }}
          NEXT_PUBLIC_AWS_REGION: ${{ env.AWS_REGION }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
        run: npm run build

      - name: Sync static assets to S3
        run: |
          aws s3 sync frontend/out/ \
            "s3://${{ steps.stack-outputs.outputs.bucket }}" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"

          # HTML and JSON files should not be cached aggressively
          aws s3 sync frontend/out/ \
            "s3://${{ steps.stack-outputs.outputs.bucket }}" \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --include "*.json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.stack-outputs.outputs.distribution }}" \
            --paths "/*"
